name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  archive-build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Package the ROMs for each model
      run: Scripts/build.sh

    - name: Archive generated ROM zips
      uses: actions/upload-artifact@v4
      with:
        path: build/zip/*.zip
        if-no-files-found: error
